<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <!-- Критично для iOS PWA: запрет масштабирования, viewport fit=cover для notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>CipherChat</title>

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CipherChat" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#09090b" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Запрет зума при фокусе на input iOS -->
  <meta name="HandheldFriendly" content="true" />

  <!-- Safari Icons -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- Splash screens iOS -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Web Manifest -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <style>
    /* === iOS PWA базовые фиксы === */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      background-color: #09090b;
    }

    body {
      height: 100%;
      height: -webkit-fill-available;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #09090b;
      /* Запрет bounce scroll на iOS */
      position: fixed;
      width: 100%;
    }

    #root {
      height: 100%;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Safe area переменные */
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }

    /* Запрет зума на input — iOS зумирует если font-size < 16px */
    input, textarea, select {
      font-size: 16px !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
